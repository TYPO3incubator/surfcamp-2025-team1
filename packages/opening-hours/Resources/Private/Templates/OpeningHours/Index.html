<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

<f:for as="openingHour" each="{openingHours}">
    <h3>{openingHour.title}</h3>
    <table class="mb-3">
        <tr>
            <th class="align-top">
                <f:translate key="tx_openinghours_domain_model_openinghours.monday"/>
            </th>
            <f:render section="timeRanges" arguments="{timeRanges: openingHour.timeRangesMonday}"/>
        </tr>
        <tr>
            <th>
                <f:translate key="tx_openinghours_domain_model_openinghours.tuesday"/>
            </th>
            <f:render section="timeRanges" arguments="{timeRanges: openingHour.timeRangesTuesday}"/>
        </tr>
        <tr>
            <th>
                <f:translate key="tx_openinghours_domain_model_openinghours.wednesday"/>
            </th>
            <f:render section="timeRanges" arguments="{timeRanges: openingHour.timeRangesWednesday}"/>
        </tr>
        <tr>
            <th>
                <f:translate key="tx_openinghours_domain_model_openinghours.thursday"/>
            </th>
            <f:render section="timeRanges" arguments="{timeRanges: openingHour.timeRangesThursday}"/>
        </tr>
        <tr>
            <th>
                <f:translate key="tx_openinghours_domain_model_openinghours.friday"/>
            </th>
            <f:render section="timeRanges" arguments="{timeRanges: openingHour.timeRangesFriday}"/>
        </tr>
        <tr>
            <th>
                <f:translate key="tx_openinghours_domain_model_openinghours.saturday"/>
            </th>
            <f:render section="timeRanges" arguments="{timeRanges: openingHour.timeRangesSaturday}"/>
        </tr>
        <tr>
            <th>
                <f:translate key="tx_openinghours_domain_model_openinghours.sunday"/>
            </th>
            <f:render section="timeRanges" arguments="{timeRanges: openingHour.timeRangesSunday}"/>
        </tr>
    </table>
</f:for>

<f:section name="timeRanges">
    <td>
        <div class="ms-5">
            <f:if condition="{timeRanges}">
                <f:then>
                    <f:for as="timeRange" each="{timeRanges}">
                        <f:format.date format="H:i">{timeRange.startTime}</f:format.date>
                        -
                        <f:format.date format="H:i">{timeRange.endTime}</f:format.date>
                        <br>
                    </f:for>
                </f:then>
                <f:else>
                    <f:translate key="tx_openinghours_domain_model_openinghours.closingDay"/>
                </f:else>
            </f:if>
        </div>
    </td>
</f:section>

</html>
