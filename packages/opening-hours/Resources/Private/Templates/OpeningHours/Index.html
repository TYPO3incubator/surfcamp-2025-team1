<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:for as="openingHour" each="{openingHours}">
    <div itemscope>
        <h3>{openingHour.title}</h3>
        <table class="mb-3">
            <tr class="mb-2">
                <th class="align-top">
                    <f:translate key="monday"/>
                </th>
                <f:render section="timeRanges" arguments="{timeRanges: openingHour.timeRangesMonday, weekday: 'Mo'}"/>
            </tr>
            <tr>
                <th class="align-top">
                    <f:translate key="tuesday"/>
                </th>
                <f:render section="timeRanges" arguments="{timeRanges: openingHour.timeRangesTuesday, weekday: 'Tu'}"/>
            </tr>
            <tr>
                <th class="align-top">
                    <f:translate key="wednesday"/>
                </th>
                <f:render section="timeRanges"
                          arguments="{timeRanges: openingHour.timeRangesWednesday, weekday: 'We'}"/>
            </tr>
            <tr>
                <th class="align-top">
                    <f:translate key="thursday"/>
                </th>
                <f:render section="timeRanges" arguments="{timeRanges: openingHour.timeRangesThursday, weekday: 'Th'}"/>
            </tr>
            <tr>
                <th class="align-top">
                    <f:translate key="friday"/>
                </th>
                <f:render section="timeRanges" arguments="{timeRanges: openingHour.timeRangesFriday, weekday: 'Fr'}"/>
            </tr>
            <tr>
                <th class="align-top">
                    <f:translate key="saturday"/>
                </th>
                <f:render section="timeRanges" arguments="{timeRanges: openingHour.timeRangesSaturday, weekday: 'Sa'}"/>
            </tr>
            <tr>
                <th class="align-top">
                    <f:translate key="sunday"/>
                </th>
                <f:render section="timeRanges" arguments="{timeRanges: openingHour.timeRangesSunday, weekday: 'Su'}"/>
            </tr>
        </table>
    </div>
</f:for>

<f:section name="timeRanges">
    <td>
        <div class="ms-5 mb-1">
            <f:if condition="{timeRanges}">
                <f:then>
                    <f:for as="timeRange" each="{timeRanges}">
                        <f:format.date format="H:i">{timeRange.startTime}</f:format.date>
                        -
                        <f:format.date format="H:i">{timeRange.endTime}</f:format.date>
                        <meta itemprop="openingHours"
                              content="{weekday} {timeRange.startTime -> f:format.date(format: 'H:i')}-{timeRange.endTime -> f:format.date(format: 'H:i')}"/>
                        <br>
                    </f:for>
                </f:then>
                <f:else>
                    <f:translate key="openingHours.closingDay"/>
                </f:else>
            </f:if>
        </div>
    </td>
</f:section>

</html>
